name: Firmware (ESP32)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Sketch-Ordner = Verzeichnis mit DF3MT-Rotor.ino (Repo-Root relativ)
      SKETCH_DIR: Firmware/DF3MT-Rotor
      # Muss zu deinem Board passen (Arduino IDE → Tools): FlashSize, PartitionScheme, Board …
      FQBN: esp32:esp32:esp32:PartitionScheme=default,FlashSize=4M
      ARDUINO_CLI_VERSION: "1.4.1"
    steps:
      - uses: actions/checkout@v6
      - name: Install Arduino CLI
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/bin" sh -s "$ARDUINO_CLI_VERSION"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          arduino-cli version
      - name: Install Arduino libraries
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "PubSubClient"    
      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn "$FQBN" \
            --output-dir "$SKETCH_DIR/build" \
            "$SKETCH_DIR"
      - name: "Upload firmware artifact (OTA: *.ino.bin)"
        uses: actions/upload-artifact@v6
        with:
          name: df3mt-rotor-firmware
          path: |
            ${{ env.SKETCH_DIR }}/build/*.bin
